<!DOCTYPE html>
<html>
<head>
<title>TurboTack Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Inter', sans-serif; background: #121212; color: #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    h1 { font-size: 3rem; margin-bottom: 40px; background: linear-gradient(45deg, #6c5ce7, #00d2ff); -webkit-background-clip: text; color: transparent; }
    .card-grid { display: flex; gap: 30px; }
    .card { background: #1e1e1e; padding: 30px; border-radius: 15px; border: 1px solid #333; width: 250px; text-align: center; transition: 0.2s; text-decoration: none; color: inherit; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .card:hover { transform: translateY(-5px); border-color: #6c5ce7; }
    .icon { font-size: 3rem; margin-bottom: 15px; display: block; }
    .title { font-weight: 900; font-size: 1.2rem; display: block; margin-bottom: 10px; }
    .desc { font-size: 0.85rem; color: #aaa; line-height: 1.4; }
</style>
</head>
<body>
    <h1>TurboTack Tools</h1>
    <div class="card-grid">
        <a href="{auth_link}" class="card">
            <span class="icon">🐶</span>
            <span class="title">Emoji Buddy</span>
            <span class="desc">Interactive avatars, petting, and chat fun.</span>
        </a>
        <a href="/css.html" class="card">
            <span class="icon">🎨</span>
            <span class="title">CSS Styler</span>
            <span class="desc">Generate custom styles for Joystick.TV chat & alerts.</span>
        </a>
    </div>
</body>
</html>
