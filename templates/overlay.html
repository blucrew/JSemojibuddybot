<!DOCTYPE html>
<html>
<head>
    <title>Emoji Buddy Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&family=Orbitron:wght@400;900&family=Permanent+Marker&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@jdecked/twemoji@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; }
        
        #container {
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
            box-sizing: border-box; 
            transition: all 0.5s ease;
            display: flex;
            flex-direction: column;
        }

        #header {
            padding: 10px;
            font-weight: bold;
            border-bottom: 2px solid;
            flex-shrink: 0;
            z-index: 10;
            text-align: center;
            font-size: 48px;
        }

        #play-area {
            position: relative;
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }

        .viewer {
            position: absolute;
            white-space: nowrap;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            will-change: transform;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .emoji-char { font-size: 4em; line-height: 1; }
        .name-tag { font-size: 1em; }
        img.emoji { height: 1em; width: 1em; margin: 0; padding: 0; display: inline; vertical-align: -0.1em; pointer-events: none; }
        
        /* Heart animation for !boop */
        .heart-pop {
            position: absolute;
            font-size: 5em;
            animation: popUp 1s ease-out forwards;
            pointer-events: none;
            z-index: 1000;
        }
        @keyframes popUp {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -150%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -300%) scale(1); opacity: 0; }
        }
        /* Scattered hearts for !pet */
        .heart-scatter {
            position: absolute;
            font-size: 1.5em;
            pointer-events: none;
            z-index: 1000;
            opacity: 1;
            transition: transform 1.4s ease-out, opacity 1.4s ease-out;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="header"></div>
        <div id="play-area"></div>
    </div>
    <audio id="squeak" src="/emojibuddy/static/squeak.mp3"></audio>

    <script>
        const CHANNEL_ID = "REPLACE_ME_CHANNEL_ID";
        let viewers = {};
        let lastEventTime = 0;
        let config = {};

        // Physics mode
        let physicsMode = 'chaos';
        let marchX = 0;
        let marchY = 0;
        let marchDir = 1;
        const MARCH_SPEED = 1.5;

        // Canvas/Physics state
        const container = document.getElementById('container');
        const playArea = document.getElementById('play-area');
        let cWidth = playArea.clientWidth;
        let cHeight = playArea.clientHeight;

        function updateSize() {
            cWidth = playArea.clientWidth;
            cHeight = playArea.clientHeight;
        }
        new ResizeObserver(updateSize).observe(playArea);

        async function fetchData() {
            try {
                const res = await fetch(`/emojibuddy/api/data/${CHANNEL_ID}?since=${lastEventTime}`);
                const data = await res.json();
                
                if (data.config) applyConfig(data.config);
                if (data.viewers) updateViewers(data.viewers);
                if (data.events) handleEvents(data.events);

            } catch (e) { console.error(e); }
            setTimeout(fetchData, 2000); 
        }

        function switchMode(newMode) {
            if (newMode === physicsMode) return;
            physicsMode = newMode;
            if (newMode === 'march') {
                marchX = 0; marchY = 0; marchDir = 1;
                for (let name in viewers) {
                    viewers[name].element.style.transition = 'transform 0.6s ease-in-out';
                }
                setTimeout(() => { for (let name in viewers) viewers[name].element.style.transition = ''; }, 700);
            } else {
                for (let name in viewers) {
                    const v = viewers[name];
                    v.vx = (Math.random() - 0.5) * 4;
                    v.vy = (Math.random() - 0.5) * 4;
                    v.element.style.transition = '';
                }
            }
        }

        function getMarchOrder() {
            const streamerName = (config.streamer_username || '').toLowerCase();
            return Object.keys(viewers).sort((a, b) => {
                if (a.toLowerCase() === streamerName) return -1;
                if (b.toLowerCase() === streamerName) return 1;
                return 0;
            });
        }

        function marchUpdate() {
            const order = getMarchOrder();
            if (order.length === 0) return;

            const firstEl = viewers[order[0]]?.element;
            const eW = firstEl ? firstEl.offsetWidth : 64;
            const eH = firstEl ? firstEl.offsetHeight : 90;
            const gap = 8;
            const cellW = eW + gap;
            const cellH = eH + gap;
            const cols = Math.max(1, Math.floor(cWidth / cellW));
            const usedCols = Math.min(order.length, cols);
            const groupW = usedCols * cellW - gap; // actual pixel width of the grid
            const totalRows = Math.ceil(order.length / cols);

            marchX += MARCH_SPEED * marchDir;

            if (marchDir === 1 && marchX + groupW >= cWidth) {
                marchDir = -1;
                marchX = cWidth - groupW;
                marchY += cellH;
                if (marchY + totalRows * cellH > cHeight) marchY = 0;
            } else if (marchDir === -1 && marchX <= 0) {
                marchDir = 1;
                marchX = 0;
                marchY += cellH;
                if (marchY + totalRows * cellH > cHeight) marchY = 0;
            }

            order.forEach((name, i) => {
                const v = viewers[name];
                if (!v || v.locked) return;
                const col = i % cols;
                const row = Math.floor(i / cols);
                v.x = marchX + col * cellW;
                v.y = marchY + row * cellH;
                v.element.style.transform = `translate(${v.x}px, ${v.y}px)`;
            });
        }

        function applyConfig(cfg) {
            config = cfg;
            if (cfg.physics_mode) switchMode(cfg.physics_mode);
            
            // 1. Color Parsing
            let r=0, g=0, b=0;
            if(cfg.bg_color && cfg.bg_color.length === 7) {
                r = parseInt(cfg.bg_color.substr(1,2), 16);
                g = parseInt(cfg.bg_color.substr(3,2), 16);
                b = parseInt(cfg.bg_color.substr(5,2), 16);
            }
            container.style.backgroundColor = `rgba(${r},${g},${b},${cfg.box_opacity})`;
            container.style.fontFamily = cfg.font_family || 'Nunito';
            
            // 2. Border Logic
            if (cfg.show_border) {
                container.style.border = `3px solid ${cfg.border_color}`;
                container.style.borderRadius = `${cfg.box_border_radius}px`;
            } else {
                container.style.border = 'none';
            }

            // 3. Header
            const header = document.getElementById('header');
            header.style.display = cfg.show_title ? 'block' : 'none';
            header.innerText = cfg.collection_name;
            header.style.color = cfg.header_color;
            header.style.borderBottomColor = cfg.header_color;
        }

        function updateViewers(list) {
            const currentUsers = new Set(list.map(u => u.username));
            for (let name in viewers) {
                if (!currentUsers.has(name)) {
                    viewers[name].element.remove();
                    delete viewers[name];
                }
            }
            list.forEach(u => {
                if (!viewers[u.username]) {
                    createViewer(u);
                } else {
                    updateViewerStyle(viewers[u.username], u);
                }
            });
        }

        function createViewer(u) {
            const el = document.createElement('div');
            el.className = 'viewer';
            playArea.appendChild(el);
            updateSize();
            viewers[u.username] = {
                element: el,
                x: Math.random() * (cWidth - 50),
                y: Math.random() * (cHeight - 50),
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                data: u
            };
            updateViewerStyle(viewers[u.username], u);
        }

        function updateViewerStyle(vObj, data) {
            vObj.data = data;
            let emoji = data.emoji; 
            if (!emoji) {
                emoji = data.is_subscriber ? config.subscriber_emoji : config.default_emoji;
            }
            let color = data.color || config.text_color;
            vObj.element.innerHTML = `<span class="emoji-char">${emoji || '🙂'}</span><span class="name-tag" style="color:${color}">${data.username}</span>`;
            twemoji.parse(vObj.element, { folder: 'svg', ext: '.svg', base: 'https://cdn.jsdelivr.net/npm/@jdecked/twemoji@latest/assets/' });
        }

        function handleEvents(events) {
            events.forEach(e => {
                if (e.timestamp > lastEventTime) {
                    lastEventTime = e.timestamp;
                    if (e.type === 'boop') triggerInteract(JSON.parse(e.data));
                    else if (e.type === 'pet') triggerPet(JSON.parse(e.data));
                    else if (e.type === 'mode_change') switchMode(JSON.parse(e.data).mode);
                }
            });
        }

        function triggerPet(data) {
            const tv = viewers[data.target];
            if (!tv) return;
            tv.locked = true;
            const el = tv.element;
            const origX = tv.x, origY = tv.y;

            const cx = cWidth / 2 - el.offsetWidth / 2;
            const cy = cHeight / 2 - el.offsetHeight / 2;
            const targetScale = Math.min(cWidth * 0.65 / el.offsetWidth, cHeight * 0.65 / el.offsetHeight);

            // Slide to center
            el.style.transition = 'transform 0.5s ease-in-out';
            el.style.transform = `translate(${cx}px, ${cy}px)`;
            tv.x = cx; tv.y = cy;

            setTimeout(() => {
                // Scale up
                el.style.transition = 'transform 0.4s ease-out';
                el.style.transform = `translate(${cx}px, ${cy}px) scale(${targetScale})`;
                const audio = document.getElementById('squeak');
                if (audio) { audio.volume = 0.9; audio.play().catch(() => {}); }

                // Scatter hearts from visual center of play area
                const hearts = ['❤️','🧡','💛','💚','💙','💜','💕','💖','💗','💘','💝'];
                for (let i = 0; i < 14; i++) {
                    const h = document.createElement('div');
                    h.className = 'heart-scatter';
                    h.innerText = hearts[Math.floor(Math.random() * hearts.length)];
                    h.style.left = (cWidth / 2) + 'px';
                    h.style.top = (cHeight / 2) + 'px';
                    playArea.appendChild(h);
                    twemoji.parse(h, { folder: 'svg', ext: '.svg', base: 'https://cdn.jsdelivr.net/npm/@jdecked/twemoji@latest/assets/' });
                    const angle = (i / 14) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
                    const dist = 120 + Math.random() * 180;
                    requestAnimationFrame(() => requestAnimationFrame(() => {
                        h.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
                        h.style.opacity = '0';
                    }));
                    setTimeout(() => h.remove(), 1800);
                }

                // Hold 3s, shrink, return
                setTimeout(() => {
                    el.style.transition = 'transform 0.4s ease-in';
                    el.style.transform = `translate(${cx}px, ${cy}px) scale(1)`;
                    setTimeout(() => {
                        el.style.transition = 'transform 0.5s ease-in-out';
                        el.style.transform = `translate(${origX}px, ${origY}px)`;
                        tv.x = origX; tv.y = origY;
                        setTimeout(() => { el.style.transition = ''; tv.locked = false; }, 500);
                    }, 400);
                }, 3000);
            }, 500);
        }

        function triggerInteract(data) {
            const sv = viewers[data.source];
            const tv = viewers[data.target];
            if (!sv || !tv) return;

            sv.locked = true;
            tv.locked = true;

            const origSx = sv.x, origSy = sv.y;
            const origTx = tv.x, origTy = tv.y;
            const mx = (origSx + origTx) / 2;
            const my = (origSy + origTy) / 2;

            sv.element.style.transition = 'transform 0.4s ease-in-out';
            tv.element.style.transition = 'transform 0.4s ease-in-out';
            sv.element.style.transform = `translate(${mx}px, ${my}px)`;
            tv.element.style.transform = `translate(${mx}px, ${my}px)`;
            sv.x = mx; sv.y = my;
            tv.x = mx; tv.y = my;

            setTimeout(() => {
                const hearts = ['❤️','🧡','💛','💚','💙','💜','💕','💖','💗','💘','💝'];
                const heart = document.createElement('div');
                heart.className = 'heart-pop';
                heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = mx + 'px';
                heart.style.top = my + 'px';
                playArea.appendChild(heart);
                twemoji.parse(heart, { folder: 'svg', ext: '.svg', base: 'https://cdn.jsdelivr.net/npm/@jdecked/twemoji@latest/assets/' });
                const audio = document.getElementById('squeak');
                if (audio) { audio.volume = 0.5; audio.play().catch(() => {}); }
                setTimeout(() => heart.remove(), 1000);

                setTimeout(() => {
                    sv.element.style.transform = `translate(${origSx}px, ${origSy}px)`;
                    tv.element.style.transform = `translate(${origTx}px, ${origTy}px)`;
                    sv.x = origSx; sv.y = origSy;
                    tv.x = origTx; tv.y = origTy;
                    setTimeout(() => {
                        sv.element.style.transition = '';
                        tv.element.style.transition = '';
                        sv.locked = false;
                        tv.locked = false;
                    }, 400);
                }, 600);
            }, 400);
        }

        function loop() {
            if (cWidth < 10 || cHeight < 10) return requestAnimationFrame(loop);
            if (physicsMode === 'march') {
                marchUpdate();
            } else {
                for (let name in viewers) {
                    const v = viewers[name];
                    if (v.locked) continue;
                    const el = v.element;
                    v.x += v.vx; v.y += v.vy;
                    if (v.x <= 0 || v.x + el.offsetWidth >= cWidth) { v.vx *= -1; v.x = Math.max(0, Math.min(v.x, cWidth - el.offsetWidth)); }
                    if (v.y <= 0 || v.y + el.offsetHeight >= cHeight) { v.vy *= -1; v.y = Math.max(0, Math.min(v.y, cHeight - el.offsetHeight)); }
                    el.style.transform = `translate(${v.x}px, ${v.y}px)`;
                }
            }
            requestAnimationFrame(loop);
        }
        fetchData();
        loop();
    </script>
</body>
</html>
